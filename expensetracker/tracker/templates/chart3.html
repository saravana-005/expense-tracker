{% extends "base.html" %}
{% load static %}
{% block title%}Expense{%endblock%}
{% block extra_styles %}
<style>

        body {
            background-color: skyblue;
        }
        input{
            border-radius:10px;
            text-align:center;
        }
        label{
            font-size:20px;
        }
        section {
            margin: 0;
            background-color: skyblue;
            display: grid;
            justify-content: center;
            position: relative;
            top: 100px;
        }

        form {
            border: 1px solid lightcoral;
            border-radius: 25px;
            height: fit-content;
            max-height: 100%;
            width: fit-content;
            max-width: 100%;
            padding: 20px 30px 30px 30px;
            transition:background 0.3s ease-in-out,color 0.2s ease-in-out;
        }
        form:hover{
            background:linear-gradient(45deg,blue,red);
            color:white;
        }
        div {
            display: flex;
            justify-content:start;
        }

        a {
            text-decoration: none;
            margin: 0px 30px 0px 10px;
            text-decoration: none;
            color: aqua;
            border: 1px solid blue;
            border-radius: 10px;
            width: fit-content;
            max-width: 100%;
            height: fit-content;
            max-height: 100%;
            padding: 5px 5px 5px 5px;
            background-color: blue;
        }
    
</style>
{%endblock%}
{%block content%}

<body>
    <div>
        <a href="{%url 'home'%}">Home </a>
        <a href="{%url 'sheet'%}">Tracker sheet</a>
    </div>
    <section>
        <h2 style="position: relative;left: 80px;">Expense Tracker</h2>
        <form method="post">
            {%csrf_token%}
            {{form.as_p}}
            <button style="position: relative;border-radius:10px;left: 80px;" type="submit">Add Expense</button>
        </form>
    </section>
</body>
{%endblock%}
